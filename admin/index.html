<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — TejDipCreations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    (function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo"><img src="../assets/logo-sm.png" alt="TejDipCreations" class="logo-img">TejDip<span>Creations</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../products.html">Shop</a></li>
        <li><a href="index.html" class="active">Admin</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">&#9790;</button>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">&#9776;</button>
      </div>
    </div>
  </nav>

  <!-- Login -->
  <section class="admin-login">
    <div class="login-card">
      <h2>Admin Login</h2>
      <p class="subtitle">Sign In To Manage Your Store</p>
      <div class="error-msg" id="errorMsg">Invalid email or password</div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@tejdipcreations.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>&copy; 2026 <a href="../index.html">TejDipCreations</a>. All rights reserved.</p>
  </footer>

  <script src="../js/theme.js"></script>
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/admin-auth.js"></script>
</body>
</html>
