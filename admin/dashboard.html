<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard — TejDipCreations Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/logo-sm.png">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    (function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
</head>
<body>

  <!-- Compact header like mobile app -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="logo"><img src="../assets/logo-sm.png" alt="TejDipCreations" class="logo-img">TejDip<span>Creations</span></a>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">&#9790;</button>
        <button class="btn-secondary btn-sm" id="logoutBtn" style="padding:0.35rem 0.8rem;font-size:0.78rem;min-height:auto;">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Dashboard -->
  <section class="admin-dashboard">
    <div class="container">
      <div class="admin-header">
        <h1>Dashboard</h1>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="add-product">Add Product</button>
        <button class="admin-tab" data-tab="manage-products">Products</button>
        <button class="admin-tab" data-tab="categories">Categories</button>
        <button class="admin-tab" data-tab="orders">Orders</button>
        <button class="admin-tab" data-tab="trash">Trash</button>
      </div>

      <!-- Add Product Panel -->
      <div class="admin-panel active" id="add-product">
        <div class="add-product-form">
          <h2>Add New Product</h2>
          <form id="addProductForm">
            <div class="form-group">
              <label for="prodName">Product Name</label>
              <input type="text" id="prodName" placeholder="e.g. Golden Nose Pin Set" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="prodCategory">Category</label>
                <select id="prodCategory" required style="width:100%;padding:0.75rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:1rem;background:var(--input-bg);color:var(--text);">
                  <option value="">Select Category</option>
                </select>
              </div>
              <div class="form-group">
                <label for="prodSubcategory">Subcategory</label>
                <select id="prodSubcategory" required style="width:100%;padding:0.75rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:1rem;background:var(--input-bg);color:var(--text);">
                  <option value="">Select Subcategory</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="prodPrice">Price (&#8377;)</label>
              <input type="number" id="prodPrice" placeholder="299" min="1" required>
            </div>
            <div class="form-group">
              <label>Main Image (required)</label>
              <div class="upload-area" id="mainImageArea">
                <div class="upload-icon">&#128247;</div>
                <div class="upload-text">Click or drag &amp; drop an image</div>
                <div class="upload-hint">Images are auto-compressed for fast loading</div>
                <input type="file" id="prodImageFile" accept="image/*" style="display:none">
              </div>
              <div class="upload-preview" id="mainImagePreview"></div>
              <div class="upload-progress" id="mainImageProgress"><div class="progress-bar"></div></div>
            </div>
            <div class="form-group">
              <label>Additional Images (optional)</label>
              <div class="upload-area" id="extraImagesArea">
                <div class="upload-icon">&#128444;</div>
                <div class="upload-text">Click or drag &amp; drop images</div>
                <div class="upload-hint">You can select multiple images</div>
                <input type="file" id="prodImagesFiles" accept="image/*" multiple style="display:none">
              </div>
              <div class="upload-preview" id="extraImagesPreview"></div>
              <div class="upload-progress" id="extraImagesProgress"><div class="progress-bar"></div></div>
            </div>
            <div class="form-group">
              <label for="prodVideo">Video URL (YouTube embed or direct)</label>
              <input type="text" id="prodVideo" placeholder="https://youtube.com/embed/...">
            </div>
            <div class="form-group">
              <label for="prodDesc">Description</label>
              <textarea id="prodDesc" placeholder="Describe the product..." required></textarea>
            </div>
            <button type="submit" class="btn-primary" style="width:100%;text-align:center;">Add Product</button>
          </form>
        </div>
      </div>

      <!-- Manage Products Panel -->
      <div class="admin-panel" id="manage-products">
        <div class="products-grid" id="adminProductsGrid">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Categories Panel -->
      <div class="admin-panel" id="categories">
        <div style="max-width:600px;">
          <div class="add-product-form" style="margin-bottom:1.5rem;">
            <h2 style="font-size:1.2rem;margin-bottom:1rem;">Add New Category</h2>
            <form id="addCategoryForm">
              <div class="form-group">
                <label for="catName">Category Name</label>
                <input type="text" id="catName" placeholder="e.g. Anklets" required>
              </div>
              <div class="form-group">
                <label>Category Image (optional, shown on home page)</label>
                <div class="upload-area" id="catImageArea" style="padding:1rem;">
                  <div class="upload-text" style="font-size:0.85rem;">Click or drag an image</div>
                  <input type="file" id="catImageFile" accept="image/*" style="display:none">
                </div>
                <div class="upload-preview" id="catImagePreview"></div>
              </div>
              <div class="form-group">
                <label for="catDesc">Description (Optional)</label>
                <input type="text" id="catDesc" placeholder="e.g. Beautiful handmade anklets">
              </div>
              <button type="submit" class="btn-primary" style="width:100%;text-align:center;">Add Category</button>
            </form>
          </div>
          <div id="categoriesList">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- Orders Panel -->
      <div class="admin-panel" id="orders">
        <div class="orders-list" id="ordersContainer">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Trash Panel -->
      <div class="admin-panel" id="trash">
        <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:1rem;">Deleted Orders Are Kept For 30 Days, Then Auto-Removed.</p>
        <div class="orders-list" id="trashContainer">
          <div class="loader"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer hidden on dashboard — bottom tab nav takes its place -->

  <div class="toast" id="toast"></div>

  <script src="../js/theme.js"></script>
  <script src="../js/back-nav.js"></script>
  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/admin-dashboard.js?v=15"></script>
</body>
</html>
